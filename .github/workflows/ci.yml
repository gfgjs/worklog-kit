# worklog-kit 自身 CI(dogfood:用本工具治理本仓 + 跑全量 selftest)。
# 零运行期依赖 → 无需 npm ci,直接 node 跑 bin。消费仓的 CI 模板见 templates/ci-github.yml。
name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group: # 拟合并结果上跑门(merge queue 要件,R2-C6)

# 最小权限(R6:workflows 收窄):门禁与 selftest 只读代码
permissions:
  contents: read

jobs:
  gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # 门禁步:本仓 docs 治理(逐条 bare 跑,各查退出码)。
      - run: node bin/worklog.mjs check
      - run: node bin/worklog.mjs index
      # selftest 步:全量套件(src/selftest.mjs SUITES 注册制,防「加了套件 CI 没加」漏跑)。
      # 不跑 skills --check(R2-M4:CI 无个人副本)。
      - run: node bin/worklog.mjs selftest
